  <rect x="722" y="358" width="130" height="24" rx="5" fill="white" stroke="#534AB7" stroke-width="0.4"/>
  <text x="787" y="370" font-size="10" fill="#3C3489" text-anchor="middle" dominant-baseline="central">与源数据关系</text>
  <rect x="722" y="388" width="130" height="24" rx="5" fill="white" stroke="#534AB7" stroke-width="0.4"/>
  <text x="787" y="400" font-size="10" fill="#3C3489" text-anchor="middle" dominant-baseline="central">产出数据表/字段</text>

  <!-- Dashed link: 结构化指标口径 → 指标 -->
  <line x1="702" y1="312" x2="714" y2="312"
        stroke="rgba(31,30,29,0.3)" stroke-width="0.6" stroke-dasharray="3 3"/>

  <!-- ═══════════════════════════════════════════ -->
