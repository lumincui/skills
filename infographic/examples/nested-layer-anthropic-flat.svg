        fill="white" stroke="#534AB7" stroke-width="0.5"/>
  <text x="469" y="536" font-size="12" font-weight="500"
        fill="#3C3489" text-anchor="middle" dominant-baseline="central">原始数据库表 🗄</text>

  <!-- 埋点元数据 -->
  <rect x="562" y="518" width="150" height="36" rx="8"
        fill="white" stroke="#534AB7" stroke-width="0.5"/>
  <text x="637" y="536" font-size="12" font-weight="500"
        fill="#3C3489" text-anchor="middle" dominant-baseline="central">埋点元数据 ✦</text>

  <!-- 侧面板连接线 -->
  <line x1="92" y1="192" x2="104" y2="192"
        stroke="rgba(31,30,29,0.25)" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="92" y1="352" x2="104" y2="352"
        stroke="rgba(31,30,29,0.25)" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="92" y1="536" x2="104" y2="536"
