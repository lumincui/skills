  <text x="54" y="135" font-size="10" fill="#085041" text-anchor="middle" dominant-baseline="central" opacity="0.75">准确性</text>

  <!-- 时效性 1 -->
  <circle cx="54" cy="188" r="18" fill="white" stroke="#0F6E56" stroke-width="0.5" opacity="0.8"/>
  <text x="54" y="188" font-size="13" text-anchor="middle" dominant-baseline="central">⏱</text>
  <text x="54" y="213" font-size="10" fill="#085041" text-anchor="middle" dominant-baseline="central" opacity="0.75">时效性</text>

  <!-- 时效性 2 -->
  <circle cx="54" cy="266" r="18" fill="white" stroke="#0F6E56" stroke-width="0.5" opacity="0.8"/>
  <text x="54" y="266" font-size="13" text-anchor="middle" dominant-baseline="central">⏱</text>
  <text x="54" y="291" font-size="10" fill="#085041" text-anchor="middle" dominant-baseline="central" opacity="0.75">时效性</text>

