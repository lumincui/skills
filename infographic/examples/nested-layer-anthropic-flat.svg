  <rect x="584" y="366" width="118" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.4"/>
  <text x="643" y="380" font-size="10" fill="#633806" text-anchor="middle" dominant-baseline="central">业务过程</text>

  <rect x="584" y="400" width="118" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.4"/>
  <text x="643" y="414" font-size="10" fill="#633806" text-anchor="middle" dominant-baseline="central">业务黑话</text>

