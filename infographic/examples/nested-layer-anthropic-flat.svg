  <line x1="760" y1="492" x2="760" y2="508"
        stroke="rgba(31,30,29,0.3)" stroke-width="0.8" stroke-dasharray="4 3"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Layer 3: 源数据层                           -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="104" y="508" width="780" height="56" rx="12"
