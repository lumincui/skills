  <text x="136" y="536" font-size="15" font-weight="600"
        fill="#3C3489" dominant-baseline="central">源数据层</text>

  <!-- SPM -->
  <rect x="246" y="518" width="130" height="36" rx="8"
        fill="white" stroke="#534AB7" stroke-width="0.5"/>
  <text x="311" y="536" font-size="12" font-weight="500"
        fill="#3C3489" text-anchor="middle" dominant-baseline="central">SPM</text>

  <!-- 原始数据库表 -->
